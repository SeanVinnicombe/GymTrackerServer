
#DB config
spring.datasource.url= ${DB_URL_DEV}
spring.datasource.username=${DB_USERNAME_DEV}
spring.datasource.password=${DB_PASSWORD_DEV}

# Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

#flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
#logging.level.org.flywaydb=DEBUG

spring.flyway.url=${DB_URL_DEV}
spring.flyway.user=${DB_USERNAME_DEV}
spring.flyway.password=${DB_PASSWORD_DEV}

#Logging config
logging.level.org.springframework.security=DEBUG
logging.level.com.github.seanv.gymtracker=DEBUG


#Security config
jwt.secret = ${JWT_SECRET_DEV}